# Kohya LoRA engine configuration example.
# Copy to engine_config.toml and adjust for your setup.

[engine]
name = "kohya"
# Path to the cloned kohya_ss repository (relative to project root or absolute).
repo_dir = "engines/kohya/kohya_ss"
# Path to the engine venv (created by launch.py). Leave empty to use auto path.
venv_dir = "engines/kohya/.venv"

[training]
# Default training script to use for LoRA.
# Options: "sd_scripts/train_network.py" (SD1.x/SDXL), "sd_scripts/sdxl_train_network.py", "flux_train_network.py"
default_script = "sd_scripts/train_network.py"

# Excluded training modes (textual inversion is always excluded per AIWF design).
# These script names will never be allowed to run through AIWF.
excluded_scripts = [
    "train_textual_inversion.py",
    "train_textual_inversion_XL.py",
    "sdxl_train_textual_inversion.py",
]

[gpu]
# Training is single-tenant — the GPU tenant lock blocks inference while training.
# Priority in the lock: kohya=90 (high), meaning kohya yields only to ed2 training.
vram_budget_mb = 0

[defaults]
# Default LoRA hyperparameters (can be overridden per job).
network_dim = 32
network_alpha = 16
learning_rate = 1e-4
unet_lr = 1e-4
text_encoder_lr = 5e-5
lr_scheduler = "cosine_with_restarts"
lr_warmup_steps = 100
max_train_steps = 1500
save_every_n_steps = 500
mixed_precision = "bf16"
save_precision = "bf16"
gradient_checkpointing = true
