# Generation engine configuration example.
# Copy to engine_config.toml and adjust for your setup.
# Settings here override config.json for generation-specific values.

[engine]
name = "generation"
# venv is shared with the main AIWF UI; leave empty to use the main venv.
venv_dir = ""

[gpu]
# Maximum VRAM (MB) the generation engine may use before triggering offload.
# Leave 0 to let the engine manage this automatically.
vram_budget_mb = 0

[offload]
# How to offload model layers when VRAM is tight.
# Options: "sequential" (slowest, ~8 GB VRAM), "model" (default, ~12-16 GB), "none" (fastest, needs full VRAM)
strategy = "model"
