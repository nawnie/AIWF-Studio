# EveryDream2 engine configuration example.
# Copy to engine_config.toml and adjust for your setup.

[engine]
name = "ed2"
# Path to the cloned EveryDream2trainer repository (relative to project root or absolute).
repo_dir = "training/EveryDream2trainer"
# Path to the engine venv (created by launch.py). Leave empty to use auto path.
# Use "studio" only for shared-venv experiments with AIWF's ED2 overlay deps.
venv_dir = "engines/ed2/.venv"

[training]
# Default training script (relative to repo_dir).
default_script = "train.py"

[gpu]
# ED2 has the highest GPU priority in AIWF (priority=100 in tenant lock).
# When an ED2 job is running, all inference is blocked.
vram_budget_mb = 0

[defaults]
# Default ED2 training hyperparameters.
# These become the base train.json config; job-level values override them.
max_epochs = 20
lr = 1.5e-6
lr_scheduler = "constant"
batch_size = 4
resolution = 512
clip_skip = 2
mixed_precision = "bf16"
save_ckpt_dir = "outputs/training/ed2"
log_dir = "outputs/logs/ed2"
# ckpt_type: "safetensors" is strongly recommended (smaller, safer than .ckpt)
ckpt_type = "safetensors"
