<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AIWF Studio Pro</title>
    <style>
      :root {
        color-scheme: light;
        --navy: #0d2d3d;
        --cream: #f3dfbd;
        --teal: #2f8580;
        --coral: #ef6846;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 0;
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 35% 20%, rgba(47, 133, 128, 0.28), transparent 32%),
          linear-gradient(135deg, #0d2d3d 0%, #173d4a 54%, #ead8b6 100%);
        color: var(--cream);
        font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(440px, calc(100vw - 32px));
        display: grid;
        justify-items: center;
        gap: 18px;
        text-align: center;
      }

      .logo {
        position: relative;
        width: 96px;
        height: 96px;
        filter: drop-shadow(0 18px 30px rgba(0, 0, 0, 0.28));
      }

      .logo span {
        position: absolute;
        display: block;
      }

      .frame {
        inset: 0;
        border: 3px solid var(--cream);
        border-radius: 22px;
        animation: slide-frame 700ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .bolt {
        left: 26px;
        top: 15px;
        width: 44px;
        height: 64px;
        background: linear-gradient(180deg, var(--coral), var(--teal));
        clip-path: polygon(55% 0, 18% 45%, 45% 45%, 28% 100%, 83% 36%, 55% 36%);
        animation: slide-bolt 700ms cubic-bezier(0.22, 1, 0.36, 1) 180ms both;
      }

      .core {
        left: 38px;
        top: 54px;
        width: 20px;
        height: 20px;
        border-radius: 999px;
        background: var(--cream);
        box-shadow: 0 0 0 8px rgba(243, 223, 189, 0.16);
        animation:
          slide-core 640ms cubic-bezier(0.22, 1, 0.36, 1) 360ms both,
          pulse 1200ms ease-in-out 1100ms infinite;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.1;
      }

      p {
        min-height: 20px;
        margin: 0;
        color: rgba(255, 246, 230, 0.78);
      }

      .steps {
        width: 100%;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 2px;
        list-style: none;
        text-align: left;
      }

      .step {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 7px 12px;
        border-radius: 10px;
        color: rgba(255, 246, 230, 0.55);
        transition: background 200ms ease, color 200ms ease;
      }

      .step.active {
        background: rgba(243, 223, 189, 0.08);
        color: var(--cream);
      }

      .step.done {
        color: rgba(255, 246, 230, 0.78);
      }

      .step-icon {
        position: relative;
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
        display: inline-block;
        border: 2px solid currentColor;
        border-radius: 999px;
        opacity: 0.55;
      }

      .step.done .step-icon {
        border: 0;
        opacity: 1;
        color: #38b98a;
      }

      .step.done .step-icon::before {
        content: "";
        position: absolute;
        left: 3px;
        top: 7px;
        width: 5px;
        height: 2px;
        background: currentColor;
        transform: rotate(45deg);
        border-radius: 2px;
      }

      .step.done .step-icon::after {
        content: "";
        position: absolute;
        left: 6px;
        top: 6px;
        width: 9px;
        height: 2px;
        background: currentColor;
        transform: rotate(-50deg);
        border-radius: 2px;
      }

      .step.active .step-icon {
        border-color: var(--coral);
        border-top-color: transparent;
        opacity: 1;
        animation: spin 900ms linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .bar {
        width: min(240px, 100%);
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(243, 223, 189, 0.18);
      }

      .bar span {
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--teal), var(--coral));
        animation: load 1200ms ease-in-out infinite;
      }

      @keyframes slide-frame {
        from {
          opacity: 0;
          transform: translateX(-34px);
        }
      }

      @keyframes slide-bolt {
        from {
          opacity: 0;
          transform: translateY(-34px);
        }
      }

      @keyframes slide-core {
        from {
          opacity: 0;
          transform: translateX(28px) scale(0.86);
        }
      }

      @keyframes pulse {
        50% {
          box-shadow: 0 0 0 14px rgba(243, 223, 189, 0.08);
        }
      }

      @keyframes load {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(260%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <main role="status" aria-live="polite">
      <div class="logo" aria-hidden="true">
        <span class="frame"></span>
        <span class="bolt"></span>
        <span class="core"></span>
      </div>
      <h1>AIWF Studio Pro</h1>
      <p id="status">Starting AIWF Studio Pro...</p>
      <ol id="steps" class="steps" aria-hidden="false"></ol>
      <div class="bar" aria-hidden="true"><span></span></div>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search)
      const target = params.get("target") || "http://127.0.0.1:7860"
      const ready = params.get("ready") || `${target.replace(/\/$/, "")}/api/pro/startup`
      const status = document.getElementById("status")
      const stepsHost = document.getElementById("steps")
      const started = Date.now()
      const FALLBACK_AFTER_MS = 240000

      // Mirrors LaunchStatusServer.PHASES in launch.py, plus the handover
      // ("spawning") and final web-app stages the launcher cannot report.
      const STEPS = [
        { phase: "launcher", label: "Launcher" },
        { phase: "environment", label: "Python environment" },
        { phase: "cuda", label: "CUDA / PyTorch" },
        { phase: "dependencies", label: "Dependencies" },
        { phase: "imports", label: "ML libraries" },
        { phase: "engines", label: "Backend engines" },
        { phase: "frontend", label: "Frontend build" },
        { phase: "spawning", label: "Backend server" },
        { phase: "web", label: "Web app" },
      ]

      const items = STEPS.map((step) => {
        const li = document.createElement("li")
        li.className = "step"
        li.innerHTML = '<span class="step-icon" aria-hidden="true"></span><span>' + step.label + "</span>"
        stepsHost.appendChild(li)
        return li
      })

      let highestIndex = 0

      function renderPhase(phase) {
        let index = STEPS.findIndex((step) => step.phase === phase)
        if (index < 0) {
          index = highestIndex
        }
        // Stages never move backwards; a launcher restart mid-boot should not
        // uncheck finished steps.
        highestIndex = Math.max(highestIndex, index)
        items.forEach((li, i) => {
          li.className = "step" + (i < highestIndex ? " done" : i === highestIndex ? " active" : "")
        })
      }

      renderPhase("launcher")

      function openApp() {
        renderPhase("web")
        status.textContent = "Opening workspace..."
        window.location.replace(target)
      }

      async function probe() {
        try {
          const response = await fetch(`${ready}?t=${Date.now()}`, { cache: "no-store" })
          const payload = await response.json()
          if (payload && payload.launcher) {
            // Launcher status server: show its live phase and keep polling.
            renderPhase(payload.phase || "launcher")
            if (payload.message) {
              status.textContent = payload.message
            }
          } else {
            // Real backend answered: hand over.
            openApp()
            return
          }
        } catch (_) {
          // Nothing readable on the port: either the backend is still binding
          // (handover window) or an older backend without CORS is up.
          if (Date.now() - started > FALLBACK_AFTER_MS) {
            try {
              await fetch(`${ready}?t=${Date.now()}`, { cache: "no-store", mode: "no-cors" })
              openApp()
              return
            } catch (_ignored) {
              /* keep waiting */
            }
          }
          if (highestIndex >= STEPS.findIndex((step) => step.phase === "spawning")) {
            renderPhase("spawning")
            status.textContent = "Starting backend server..."
          }
        }
        window.setTimeout(probe, 500)
      }

      window.setTimeout(probe, 300)
    </script>
  </body>
</html>
